        function App() {
            const [selectedUnits, setSelectedUnits] = useState(['j1-u1']);
            const [count, setCount] = useState(10);
            const [questionType, setQuestionType] = useState('random'); // 'enToJa', 'jaToEn', 'random'
            const [problems, setProblems] = useState([]);
            const [showAnswers, setShowAnswers] = useState(false);
            const [error, setError] = useState('');

            const toggleUnit = (unitId) => {
                setError('');
                setSelectedUnits(prev => {
                    if (prev.includes(unitId)) return prev.filter(id => id !== unitId);
                    return [...prev, unitId];
                });
            };

            const toggleAll = () => {
                const allIds = wordDictionary.flatMap(g => g.items.map(i => i.id));
                if (selectedUnits.length === allIds.length) {
                    setSelectedUnits([]);
                } else {
                    setSelectedUnits(allIds);
                }
            };

            const toggleGroup = (groupIds) => {
                const isAllGroupSelected = groupIds.every(id => selectedUnits.includes(id));
                if (isAllGroupSelected) {
                    setSelectedUnits(prev => prev.filter(id => !groupIds.includes(id)));
                } else {
                    setSelectedUnits(prev => {
                        const newSelection = [...prev];
                        groupIds.forEach(id => {
                            if (!newSelection.includes(id)) newSelection.push(id);
                        });
                        return newSelection;
                    });
                }
            };

            const totalUnitsCount = wordDictionary.flatMap(g => g.items).length;

            const generate = () => {
                if (selectedUnits.length === 0) {
                    setError('1つ以上の出題範囲を選択してください。');
                    setProblems([]);
                    return;
                }
                setError('');

                // 選択されたUnitから単語を収集
                let wordPool = [];
                selectedUnits.forEach(unitId => {
                    wordDictionary.forEach(group => {
                        const unit = group.items.find(u => u.id === unitId);
                        if (unit) {
                            wordPool = wordPool.concat(unit.words);
                        }
                    });
                });

                // シャッフルしてランダム抽出
                wordPool = shuffle(wordPool);
                const actualCount = Math.min(count, wordPool.length);
                const selectedWords = wordPool.slice(0, actualCount);

                const newProblems = selectedWords.map(word => {
                    let isEnToJa = true;
                    if (questionType === 'jaToEn') isEnToJa = false;
                    else if (questionType === 'random') isEnToJa = Math.random() > 0.5;

                    return {
                        q: isEnToJa ? word.en : word.ja,
                        a: isEnToJa ? word.ja : word.en,
                        type: isEnToJa ? 'enToJa' : 'jaToEn'
                    };
                });

                setProblems(newProblems);
                setShowAnswers(false);
            };

            // 設定変更時に問題を自動生成
            useEffect(() => {
                if (selectedUnits.length > 0) {
                    generate();
                } else {
                    setProblems([]);
                    setError('1つ以上の単元を選択してください。');
                }
            }, [selectedUnits, count, questionType]);

            const print = () => window.print();

            const getTestTitle = () => {
                if (selectedUnits.length === 1) {
                    const allItems = wordDictionary.flatMap(g => g.items);
                    return allItems.find(u => u.id === selectedUnits[0])?.name + ' 英単語テスト';
                }
                return '英単語 総合復習テスト';
            };

            return (
                <div className="min-h-screen bg-gray-100 p-4 sm:p-6 lg:p-8 font-sans text-gray-900 print:bg-white print:p-0">
                    <div className="max-w-[1400px] mx-auto flex flex-col lg:flex-row gap-6 lg:gap-8 print:block print:max-w-none print:mx-0">
                        
                        {/* 左側コントロールパネル (印刷時非表示) */}
                        <div className="w-full lg:w-[320px] shrink-0 print:hidden">
                            <div className="bg-white p-5 sm:p-6 rounded-xl shadow-md lg:sticky lg:top-8 lg:max-h-[calc(100vh-4rem)] overflow-y-auto flex flex-col gap-6 custom-scrollbar">
                                <div>
                                    <h1 className="text-xl font-bold text-gray-800 mb-1">英単語小テスト作成</h1>
                                    <p className="text-xs text-gray-500 leading-relaxed">設定を変更すると、右側のプリントにリアルタイムで問題が自動生成されます。</p>
                                </div>

                                {/* 単元選択 */}
                                <div>
                                    <div className="flex justify-between items-end mb-2 border-b border-gray-300 pb-2">
                                        <label className="block text-sm font-bold text-gray-700">出題範囲</label>
                                        <button onClick={toggleAll} className="text-xs text-blue-600 hover:text-blue-800 font-medium bg-blue-50 px-2 py-1 rounded">
                                            {selectedUnits.length === totalUnitsCount ? 'すべて解除' : 'すべて選択'}
                                        </button>
                                    </div>
                                    
                                    <div className="space-y-4 mt-3">
                                        {wordDictionary.map((group, idx) => {
                                            const groupIds = group.items.map(i => i.id);
                                            const isAllGroupSelected = groupIds.every(id => selectedUnits.includes(id));
                                            return (
                                            <div key={idx} className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                                                <div className="flex justify-between items-center mb-2 border-b border-gray-200 pb-1.5">
                                                    <h3 className="text-xs font-bold text-gray-600">{group.grade}</h3>
                                                    <button onClick={() => toggleGroup(groupIds)} className="text-[11px] text-blue-500 hover:text-blue-700 font-medium">
                                                        {isAllGroupSelected ? 'この学年を解除' : 'この学年をすべて選択'}
                                                    </button>
                                                </div>
                                                <div className="flex flex-col gap-1 mt-2">
                                                    {group.items.map(u => (
                                                        <label key={u.id} className={`flex items-center p-1.5 rounded cursor-pointer transition-colors ${selectedUnits.includes(u.id) ? 'bg-blue-100 text-blue-800 font-semibold' : 'hover:bg-gray-200 text-gray-700 font-medium'}`}>
                                                            <input 
                                                                type="checkbox" 
                                                                className="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
                                                                checked={selectedUnits.includes(u.id)}
                                                                onChange={() => toggleUnit(u.id)}
                                                            />
                                                            <span className="ml-2 text-sm">{u.name}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        )})}
                                    </div>
                                    {error && <p className="text-red-500 text-xs mt-3 font-bold">{error}</p>}
                                </div>

                                {/* 出題形式と問題数 */}
                                <div className="space-y-4 border-t pt-4 border-gray-100">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">出題形式</label>
                                        <select 
                                            value={questionType} 
                                            onChange={(e) => setQuestionType(e.target.value)}
                                            className="w-full bg-gray-50 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-2.5 outline-none transition-shadow text-sm font-medium"
                                        >
                                            <option value="enToJa">英単語 → 日本語訳</option>
                                            <option value="jaToEn">日本語訳 → 英単語</option>
                                            <option value="random">ランダムに出題</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">問題数</label>
                                        <select 
                                            value={count} 
                                            onChange={(e) => setCount(Number(e.target.value))}
                                            className="w-full bg-gray-50 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-2.5 outline-none transition-shadow text-sm font-medium"
                                        >
                                            <option value={10}>10問</option>
                                            <option value={20}>20問 (約10分)</option>
                                            <option value={30}>30問</option>
                                            <option value={50}>50問</option>
                                        </select>
                                        <p className="text-[10px] text-gray-400 mt-1">※選択範囲の単語数が少ない場合は、最大単語数で作成されます。</p>
                                    </div>
                                </div>

                                {/* アクションボタン */}
                                <div className="space-y-2.5 border-t pt-4 border-gray-100">
                                    <button 
                                        onClick={generate}
                                        disabled={selectedUnits.length === 0}
                                        className="w-full flex items-center justify-center gap-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 font-medium py-2.5 px-4 rounded-lg transition-colors text-sm border border-blue-200 disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        <RefreshIcon />
                                        別の問題を生成
                                    </button>

                                    <button 
                                        onClick={() => setShowAnswers(!showAnswers)}
                                        disabled={selectedUnits.length === 0}
                                        className="w-full flex items-center justify-center gap-1.5 bg-gray-50 hover:bg-gray-100 text-gray-700 font-medium py-2.5 px-4 rounded-lg transition-colors text-sm border border-gray-200 disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        {showAnswers ? <EyeOffIcon /> : <EyeIcon />}
                                        {showAnswers ? '解答を隠す' : '解答を表示'}
                                    </button>

                                    <button 
                                        onClick={print}
                                        disabled={selectedUnits.length === 0}
                                        className="w-full flex items-center justify-center gap-1.5 bg-gray-800 hover:bg-gray-900 text-white font-medium py-2.5 px-4 rounded-lg transition-colors text-sm shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                                    >
                                        <PrinterIcon />
                                        プリントを印刷
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* 右側 プリントプレビュー */}
                        <div className="flex-1 flex justify-center print:block">
                            <div className="w-full max-w-4xl bg-white p-8 sm:p-12 md:p-16 rounded-xl shadow-md print:shadow-none print:p-0 min-h-[297mm]">
                                
                                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-end border-b-2 border-gray-800 pb-4 mb-8 gap-4">
                                    <h2 className="text-xl sm:text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">
                                        {getTestTitle()}
                                    </h2>
                                    <div className="flex gap-3 sm:gap-4 text-sm sm:text-base font-medium text-gray-800 shrink-0">
                                        <div className="border-b border-gray-400 w-12 sm:w-16 text-center pb-1">　年</div>
                                        <div className="border-b border-gray-400 w-12 sm:w-16 text-center pb-1">　組</div>
                                        <div className="border-b border-gray-400 w-12 sm:w-16 text-center pb-1">　番</div>
                                        <div className="border-b border-gray-400 w-24 sm:w-40 pb-1">氏名</div>
                                    </div>
                                </div>

                                {problems.length > 0 ? (
                                    <div className="grid gap-x-8 sm:gap-x-16 md:gap-x-20 gap-y-6 sm:gap-y-8 grid-cols-1 md:grid-cols-2">
                                        {problems.map((p, i) => (
                                            <div key={i} className="flex gap-3 sm:gap-4 break-inside-avoid items-center">
                                                <div className="font-bold text-base sm:text-lg text-gray-800 w-6 sm:w-8 shrink-0 text-right">({i + 1})</div>
                                                <div className={`w-32 sm:w-40 shrink-0 text-base sm:text-lg font-medium ${p.type === 'enToJa' ? 'font-serif tracking-wide' : ''}`}>
                                                    {p.q}
                                                </div>
                                                <div className="flex-1 border-b border-gray-400 relative h-8">
                                                    {showAnswers && (
                                                        <span className={`absolute bottom-0 left-2 text-red-600 font-bold text-base sm:text-lg ${p.type === 'jaToEn' ? 'font-serif tracking-wide' : ''}`}>
                                                            {p.a}
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="flex items-center justify-center h-64 text-gray-400 text-lg">
                                        {error ? '左のパネルから出題範囲を選択してください。' : '問題を生成しています...'}
                                    </div>
                                )}
                                
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        // Reactアプリのレンダリング
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
