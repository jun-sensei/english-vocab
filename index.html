        // --- Main App ---
        function App() {
            const [selectedUnits, setSelectedUnits] = useState(['j1-u1']);
            const [count, setCount] = useState(10);
            const [questionType, setQuestionType] = useState('random'); // 'enToJa', 'jaToEn', 'random', 'fillInTheBlank'
            const [problems, setProblems] = useState([]);
            const [showAnswers, setShowAnswers] = useState(false);
            const [error, setError] = useState('');
            const [isSettingMode, setIsSettingMode] = useState(true);

            const toggleUnit = (unitId) => {
                setError('');
                setSelectedUnits(prev => {
                    if (prev.includes(unitId)) return prev.filter(id => id !== unitId);
                    return [...prev, unitId];
                });
            };

            const toggleAll = () => {
                const allIds = wordDictionary.flatMap(g => g.items.map(i => i.id));
                if (selectedUnits.length === allIds.length) {
                    setSelectedUnits([]);
                } else {
                    setSelectedUnits(allIds);
                }
            };

            const toggleGroup = (groupIds) => {
                const isAllGroupSelected = groupIds.every(id => selectedUnits.includes(id));
                if (isAllGroupSelected) {
                    setSelectedUnits(prev => prev.filter(id => !groupIds.includes(id)));
                } else {
                    setSelectedUnits(prev => {
                        const newSelection = [...prev];
                        groupIds.forEach(id => {
                            if (!newSelection.includes(id)) newSelection.push(id);
                        });
                        return newSelection;
                    });
                }
            };

            const totalUnitsCount = wordDictionary.flatMap(g => g.items).length;

            const generate = () => {
                if (selectedUnits.length === 0) {
                    setError('1つ以上の出題範囲を選択してください。');
                    setProblems([]);
                    return;
                }
                setError('');

                // 選択されたUnitから単語を収集
                let wordPool = [];
                selectedUnits.forEach(unitId => {
                    wordDictionary.forEach(group => {
                        const unit = group.items.find(u => u.id === unitId);
                        if (unit) {
                            wordPool = wordPool.concat(unit.words);
                        }
                    });
                });

                // シャッフルしてランダム抽出
                wordPool = shuffle(wordPool);
                const actualCount = Math.min(count, wordPool.length);
                const selectedWords = wordPool.slice(0, actualCount);

                const newProblems = selectedWords.map(word => {
                    let type = questionType;
                    if (type === 'random') {
                        const types = ['enToJa', 'jaToEn', 'fillInTheBlank'];
                        type = types[Math.floor(Math.random() * types.length)];
                    }

                    if (type === 'fillInTheBlank' && (!word.exEn || !word.exJa)) {
                        // 例文がない単語が選ばれた場合は、英→日・日→英のどちらかにフォールバックする
                        type = Math.random() > 0.5 ? 'enToJa' : 'jaToEn';
                    }

                    return {
                        en: word.en,
                        ja: word.ja,
                        exEn: word.exEn,
                        exJa: word.exJa,
                        type: type
                    };
                });

                setProblems(newProblems);
                setShowAnswers(false);
                setIsSettingMode(false);
                window.scrollTo(0, 0);
            };

            // 設定変更時に問題を自動生成
            useEffect(() => {
                if (selectedUnits.length > 0 && !isSettingMode) {
                    generate();
                } else if (selectedUnits.length === 0 && !isSettingMode) {
                    setProblems([]);
                    setError('1つ以上の出題範囲を選択してください。');
                }
            // eslint-disable-next-line react-hooks/exhaustive-deps
            }, [selectedUnits, count, questionType]);

            const print = () => window.print();

            const getTestTitle = () => {
                if (selectedUnits.length === 1) {
                    const allItems = wordDictionary.flatMap(g => g.items);
                    return allItems.find(u => u.id === selectedUnits[0])?.name + ' 英単語テスト';
                }
                return '英単語 総合復習テスト';
            };

            if (isSettingMode) {
                return (
                    <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4 font-sans text-gray-900 py-10">
                        <div className="w-full max-w-2xl bg-white p-6 sm:p-8 rounded-2xl shadow-lg">
                            <div className="text-center mb-8">
                                <h1 className="text-2xl font-bold text-gray-800 mb-2">英単語小テスト作成ツール</h1>
                                <p className="text-gray-500 text-sm">出題範囲、問題数、出題形式を選んでください。<br/>複数選択するとランダムに混ざって出題されます。</p>
                            </div>

                            <div className="space-y-6">
                                {/* 単元選択 */}
                                <div>
                                    <div className="flex justify-between items-end mb-3">
                                        <label className="block text-base font-bold text-gray-800">出題範囲 (NEW HORIZON基準)</label>
                                        <button onClick={toggleAll} className="text-sm text-blue-600 hover:text-blue-800 font-medium bg-blue-50 px-3 py-1.5 rounded-md transition-colors">
                                            {selectedUnits.length === totalUnitsCount ? 'すべて解除' : 'すべて選択'}
                                        </button>
                                    </div>
                                    
                                    <div className="space-y-5 h-72 overflow-y-auto custom-scrollbar pr-3 border border-gray-200 p-4 rounded-xl bg-gray-50">
                                        {wordDictionary.map((group, idx) => {
                                            const groupIds = group.items.map(i => i.id);
                                            const isAllGroupSelected = groupIds.every(id => selectedUnits.includes(id));
                                            return (
                                            <div key={idx} className="bg-white p-4 rounded-lg border border-gray-200 shadow-sm">
                                                <div className="flex justify-between items-center mb-3 border-b border-gray-100 pb-2">
                                                    <h3 className="text-sm font-bold text-gray-700">{group.grade}</h3>
                                                    <button onClick={() => toggleGroup(groupIds)} className="text-xs text-blue-500 hover:text-blue-700 font-medium bg-blue-50 px-2 py-1 rounded transition-colors">
                                                        {isAllGroupSelected ? 'この学年を解除' : 'この学年をすべて選択'}
                                                    </button>
                                                </div>
                                                <div className="flex flex-wrap gap-2 mt-2">
                                                    {group.items.map(u => (
                                                        <label key={u.id} className={`flex items-center px-3 py-2 border rounded-lg cursor-pointer transition-colors text-sm ${selectedUnits.includes(u.id) ? 'bg-blue-100 border-blue-400 text-blue-800 font-bold' : 'bg-white border-gray-300 hover:bg-gray-100 text-gray-700 font-medium'}`}>
                                                            <input 
                                                                type="checkbox" 
                                                                className="hidden"
                                                                checked={selectedUnits.includes(u.id)}
                                                                onChange={() => toggleUnit(u.id)}
                                                            />
                                                            {u.name}
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        )})}
                                    </div>
                                    {error && <p className="text-red-500 text-sm mt-3 font-bold">{error}</p>}
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 pt-2">
                                    {/* 出題形式 */}
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">出題形式</label>
                                        <select 
                                            value={questionType} 
                                            onChange={(e) => setQuestionType(e.target.value)}
                                            className="w-full bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-3 outline-none transition-shadow font-medium"
                                        >
                                            <option value="enToJa">英単語 → 日本語訳</option>
                                            <option value="jaToEn">日本語訳 → 英単語</option>
                                            <option value="fillInTheBlank">例文穴埋め (ヒント付き)</option>
                                            <option value="random">ランダムにミックス出題</option>
                                        </select>
                                    </div>

                                    {/* 問題数選択 */}
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">問題数</label>
                                        <select 
                                            value={count} 
                                            onChange={(e) => setCount(Number(e.target.value))}
                                            className="w-full bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-3 outline-none transition-shadow font-medium"
                                        >
                                            <option value={10}>10問</option>
                                            <option value={20}>20問 (約10分)</option>
                                            <option value={30}>30問</option>
                                            <option value={50}>50問</option>
                                        </select>
                                        <p className="text-xs text-gray-400 mt-2">※選択した範囲の単語数が少ない場合は、最大単語数で作成されます。</p>
                                    </div>
                                </div>

                                <button 
                                    onClick={generate}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl transition-colors shadow-md mt-6 text-lg"
                                >
                                    プリントを作成する
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100 font-sans text-gray-900 print:bg-white">
                    {/* Top Navigation Bar (Hidden on Print) */}
                    <div className="bg-white border-b shadow-sm sticky top-0 z-10 print:hidden">
                        <div className="max-w-5xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
                            <button 
                                onClick={() => setIsSettingMode(true)}
                                className="flex items-center gap-1.5 text-gray-600 hover:text-gray-900 font-medium py-2 px-3 rounded-md hover:bg-gray-100 transition-colors text-sm"
                            >
                                <BackIcon />
                                設定に戻る
                            </button>

                            <div className="flex items-center gap-2">
                                <button 
                                    onClick={generate}
                                    className="flex items-center gap-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 font-medium py-2 px-4 rounded-md transition-colors text-sm border border-blue-200 shadow-sm"
                                >
                                    <RefreshIcon />
                                    別の問題を生成
                                </button>

                                <button 
                                    onClick={() => setShowAnswers(!showAnswers)}
                                    className="flex items-center gap-1.5 bg-gray-50 hover:bg-gray-100 text-gray-700 font-medium py-2 px-4 rounded-md transition-colors text-sm border border-gray-200 shadow-sm"
                                >
                                    {showAnswers ? <EyeOffIcon /> : <EyeIcon />}
                                    {showAnswers ? '解答を隠す' : '解答を表示'}
                                </button>

                                <button 
                                    onClick={print}
                                    className="flex items-center gap-1.5 bg-gray-800 hover:bg-gray-900 text-white font-medium py-2 px-4 rounded-md transition-colors text-sm shadow-sm"
                                >
                                    <PrinterIcon />
                                    印刷
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Print Area / Document Preview */}
                    <div className="p-4 sm:p-8 flex justify-center print:p-0">
                        <div className="w-full max-w-5xl bg-white p-6 sm:p-10 md:p-14 rounded-xl shadow-md print:shadow-none print:p-0 min-h-[297mm]">
                            
                            <div className="flex flex-col sm:flex-row sm:justify-between sm:items-end border-b-2 border-gray-800 pb-4 mb-8 sm:mb-10 gap-4">
                                <h2 className="text-xl sm:text-2xl md:text-3xl font-bold text-gray-900 tracking-tight">
                                    {getTestTitle()}
                                </h2>
                                <div className="flex gap-3 sm:gap-4 text-sm sm:text-base font-medium text-gray-800 shrink-0">
                                    <div className="border-b border-gray-400 w-12 sm:w-16 text-center pb-1">　年</div>
                                    <div className="border-b border-gray-400 w-12 sm:w-16 text-center pb-1">　組</div>
                                    <div className="border-b border-gray-400 w-12 sm:w-16 text-center pb-1">　番</div>
                                    <div className="border-b border-gray-400 w-24 sm:w-40 pb-1">氏名</div>
                                </div>
                            </div>

                            {problems.length > 0 ? (
                                <div className="grid gap-x-8 sm:gap-x-12 md:gap-x-16 gap-y-8 sm:gap-y-10 grid-cols-1 md:grid-cols-2">
                                    {problems.map((p, i) => {
                                        const isFillInTheBlank = p.type === 'fillInTheBlank';
                                        return (
                                            <div key={i} className="flex gap-3 sm:gap-4 break-inside-avoid w-full">
                                                <div className="font-bold text-base sm:text-lg text-gray-800 w-6 sm:w-8 shrink-0 text-right mt-0.5">({i + 1})</div>
                                                
                                                <div className="flex flex-col w-full">
                                                    {isFillInTheBlank ? (
                                                        <div className="flex flex-col gap-1 w-full">
                                                            <div className="font-serif text-lg tracking-wide text-gray-900 leading-snug">
                                                                {p.exEn}
                                                            </div>
                                                            <div className="text-sm text-gray-600 leading-snug">
                                                                {p.exJa}
                                                            </div>
                                                            <div className="flex items-end gap-3 mt-2">
                                                                <div className="text-sm text-blue-700 font-bold shrink-0">【意味】 {p.ja}</div>
                                                                <div className="flex-1 border-b border-gray-400 relative h-6">
                                                                    {showAnswers && (
                                                                        <span className="absolute bottom-0 left-2 text-red-600 font-bold text-lg font-serif tracking-wide">
                                                                            {p.en}
                                                                        </span>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <div className="flex items-center w-full">
                                                            <div className={`w-32 sm:w-40 shrink-0 text-base sm:text-lg font-medium text-gray-900 ${p.type === 'enToJa' ? 'font-serif tracking-wide' : ''}`}>
                                                                {p.type === 'enToJa' ? p.en : p.ja}
                                                            </div>
                                                            <div className="flex-1 border-b border-gray-400 relative h-8">
                                                                {showAnswers && (
                                                                    <span className={`absolute bottom-0 left-2 text-red-600 font-bold text-base sm:text-lg ${p.type === 'jaToEn' ? 'font-serif tracking-wide' : ''}`}>
                                                                        {p.type === 'jaToEn' ? p.en : p.ja}
                                                                    </span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : (
                                <div className="flex items-center justify-center h-64 text-gray-400 text-lg">
                                    {error ? '左のパネルから出題範囲を選択してください。' : '問題を生成しています...'}
                                </div>
                            )}
                            
                        </div>
                    </div>

                </div>
            );
        }

        // Reactアプリのレンダリング
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
